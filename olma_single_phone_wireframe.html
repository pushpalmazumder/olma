<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OLMA &ndash; Patient App &middot; Single Phone Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#8B6914;
  --blk:#090909;--dk1:#111;--dk2:#181818;--dk3:#222;--dk4:#2a2a2a;
  --grey:#888;--light:#E8E4DC;--white:#F8F4EC;
  --grn:#4CAF50;--amb:#FFA726;--red:#E53935;--blu:#42A5F5;--pur:#9C27B0;
  --r:14px;--sh:0 8px 32px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0D0D0D;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 10px 40px;color:var(--white);}

/* PAGE TITLE */
.page-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;text-align:center;}
.page-sub{font-size:.68rem;color:var(--grey);letter-spacing:.1em;text-align:center;margin-bottom:24px;}

/* FLOW LABELS */
.flow-wrap{display:flex;flex-wrap:wrap;gap:32px;justify-content:center;max-width:1600px;width:100%;}
.flow-group{display:flex;flex-direction:column;align-items:center;gap:6px;}
.flow-label{font-size:.58rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;text-align:center;font-weight:600;padding:4px 12px;border:1px solid rgba(201,168,76,.2);border-radius:20px;background:rgba(201,168,76,.06);}
.arrow-right{color:var(--gold);font-size:1.2rem;display:flex;align-items:center;justify-content:center;padding:0 6px;margin-top:72px;opacity:.5;}

/* PHONE */
.phone{
  width:320px;height:660px;
  background:var(--dk1);
  border-radius:38px;
  border:1.5px solid #2a2a2a;
  position:relative;overflow:hidden;
  box-shadow:var(--sh),0 0 0 1px #1a1a1a,inset 0 0 0 1px rgba(255,255,255,.03);
  flex-shrink:0;
}
.phone::before{content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);width:80px;height:3px;background:#1e1e1e;border-radius:3px;z-index:20;}

/* SCREENS */
.screen{display:none;position:absolute;inset:0;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* STATUS BAR */
.sb{display:flex;justify-content:space-between;align-items:center;padding:22px 18px 6px;font-size:.6rem;font-weight:600;color:var(--white);flex-shrink:0;z-index:5;}

/* SCROLLABLE CONTENT */
.cnt{flex:1;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:none;}
.cnt::-webkit-scrollbar{display:none;}
.px{padding-left:16px;padding-right:16px;}
.pb{padding-bottom:16px;}

/* BOTTOM NAV */
.bnav{display:flex;justify-content:space-around;padding:8px 0 16px;background:var(--dk2);border-top:1px solid #222;flex-shrink:0;}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 10px;border-radius:10px;transition:all .2s;}
.ni:hover{background:rgba(201,168,76,.08);}
.ni.on .nic{color:var(--gold);}
.ni.on .nil{color:var(--gold);}
.nic{font-size:1.1rem;color:var(--grey);}
.nil{font-size:.5rem;color:var(--grey);letter-spacing:.04em;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 10px;flex-shrink:0;}
.hback{width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gold);font-size:1rem;border-radius:8px;background:rgba(201,168,76,.08);}
.htitle{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500;color:var(--white);letter-spacing:.04em;}
.hact{width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--grey);font-size:.9rem;}

/* BUTTONS */
.bg{background:linear-gradient(135deg,var(--gold-d),var(--gold-l));color:var(--blk);border:none;border-radius:50px;padding:13px 22px;font-size:.75rem;font-weight:700;letter-spacing:.07em;cursor:pointer;width:100%;text-transform:uppercase;transition:all .2s;box-shadow:0 4px 14px rgba(201,168,76,.25);}
.bg:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,168,76,.35);}
.bo{background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,.5);border-radius:50px;padding:11px 22px;font-size:.75rem;font-weight:500;cursor:pointer;width:100%;letter-spacing:.05em;transition:all .2s;}
.bo:hover{background:rgba(201,168,76,.08);}
.bgh{background:transparent;color:var(--grey);border:none;padding:6px;font-size:.7rem;cursor:pointer;letter-spacing:.04em;text-decoration:underline;}
.bsm{padding:9px 16px;font-size:.68rem;letter-spacing:.05em;}

/* INPUTS */
.inp{width:100%;background:var(--dk3);border:1px solid #333;border-radius:10px;padding:12px 14px;font-size:.8rem;color:var(--white);outline:none;font-family:'Inter',sans-serif;margin-bottom:10px;transition:border-color .2s;}
.inp:focus{border-color:var(--gold);}
.inp::placeholder{color:#444;}
.lbl{font-size:.58rem;color:var(--grey);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;display:block;}
select.inp{appearance:none;}

/* CARDS */
.card{background:var(--dk3);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid #252525;}
.card-g{background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.25);}
.card-r{background:linear-gradient(135deg,rgba(229,57,53,.12),rgba(229,57,53,.04));border:1px solid rgba(229,57,53,.25);}
.card-b{background:linear-gradient(135deg,rgba(66,165,245,.1),rgba(66,165,245,.03));border:1px solid rgba(66,165,245,.2);}

/* SCORE RING */
.sring{position:relative;width:110px;height:110px;flex-shrink:0;}
.sring svg{transform:rotate(-90deg);}
.sctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.snum{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--gold);line-height:1;}
.slbl{font-size:.45rem;color:var(--grey);letter-spacing:.1em;text-transform:uppercase;}

/* BADGES */
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.56rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.bg-g{background:rgba(76,175,80,.15);color:#81C784;border:1px solid rgba(76,175,80,.25);}
.bg-a{background:rgba(255,167,38,.15);color:#FFB74D;border:1px solid rgba(255,167,38,.25);}
.bg-r{background:rgba(229,57,53,.15);color:#EF9A9A;border:1px solid rgba(229,57,53,.25);}
.bg-gold{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
.bg-b{background:rgba(66,165,245,.15);color:#90CAF9;border:1px solid rgba(66,165,245,.25);}

/* PILLAR ROW */
.pr{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #1e1e1e;gap:8px;}
.pr:last-child{border-bottom:none;}
.pico{font-size:.9rem;width:22px;}
.pnm{font-size:.72rem;flex:1;color:var(--light);}
.pbar{width:60px;height:3px;background:#222;border-radius:2px;}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold-d),var(--gold));}
.pval{font-size:.68rem;color:var(--gold);font-weight:600;width:24px;text-align:right;}

/* BIO ROW */
.bior{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #1e1e1e;gap:6px;}
.bior:last-child{border-bottom:none;}
.bionm{font-size:.72rem;flex:1;color:var(--light);}
.bioval{font-size:.75rem;font-weight:600;margin-right:4px;}
.biodot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* VITA BUBBLE */
.vbub{background:linear-gradient(135deg,#16172a,#1a1c38);border:1px solid rgba(201,168,76,.2);border-radius:16px 16px 16px 3px;padding:10px 12px;font-size:.73rem;line-height:1.5;color:var(--light);}
.vname{font-size:.55rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;font-weight:600;}
.vav{width:30px;height:30px;background:linear-gradient(135deg,var(--gold-d),var(--gold));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}

/* OTP */
.otpw{display:flex;gap:7px;justify-content:center;margin:14px 0;}
.otpb{width:40px;height:50px;background:var(--dk3);border:1px solid #333;border-radius:9px;font-size:1.3rem;font-weight:700;text-align:center;color:var(--gold);caret-color:var(--gold);}

/* STEP DOTS */
.sdots{display:flex;justify-content:center;gap:5px;padding:8px 0;}
.sdot{width:5px;height:5px;border-radius:50%;background:#333;}
.sdot.on{background:var(--gold);width:16px;border-radius:3px;}

/* TASK */
.task{display:flex;align-items:flex-start;padding:10px 12px;background:var(--dk3);border-radius:11px;margin-bottom:7px;border:1px solid #252525;cursor:pointer;transition:all .2s;gap:10px;}
.task:hover{border-color:rgba(201,168,76,.2);}
.tchk{width:20px;height:20px;border-radius:5px;border:1.5px solid #444;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--gold);transition:all .2s;margin-top:1px;}
.task.dn .tchk{background:rgba(201,168,76,.15);border-color:var(--gold);}
.ttxt{font-size:.74rem;flex:1;color:var(--light);}
.tsub{font-size:.62rem;color:var(--grey);margin-top:2px;}

/* SECTION TITLE */
.st{font-size:.56rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:8px;padding-left:1px;}

/* DIVIDER */
.div{height:1px;background:linear-gradient(90deg,transparent,#2a2a2a,transparent);margin:10px 0;}

/* KIT CARD */
.kc{background:var(--dk3);border:1.5px solid #2a2a2a;border-radius:var(--r);padding:14px;margin-bottom:9px;cursor:pointer;transition:all .2s;}
.kc:hover,.kc.sel{border-color:var(--gold);background:rgba(201,168,76,.07);}
.ktitle{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500;color:var(--white);}
.kprice{font-size:1.1rem;font-weight:700;color:var(--gold);}
.kdesc{font-size:.64rem;color:var(--grey);margin-top:3px;line-height:1.4;}

/* PROGRESS BAR */
.pbw{background:#222;border-radius:4px;height:5px;overflow:hidden;}
.pbf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold-d),var(--gold));}

/* TRACKER STEP */
.trstep{display:flex;align-items:center;gap:9px;padding:7px 0;}
.trdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.trdot.dn{background:var(--gold);}
.trdot.ac{background:var(--grn);box-shadow:0 0 7px var(--grn);}
.trdot.pd{background:#2a2a2a;border:1px solid #444;}
.trlbl{font-size:.7rem;color:var(--light);}

/* WEARABLE METRIC */
.wm{background:var(--dk4);border-radius:10px;padding:12px;text-align:center;}
.wmico{font-size:1.2rem;margin-bottom:3px;}
.wmval{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold);line-height:1;}
.wmlbl{font-size:.52rem;color:var(--grey);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}

/* NOTIF ITEM */
.notif{padding:11px 14px;border-bottom:1px solid #1e1e1e;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:background .15s;}
.notif:hover{background:rgba(201,168,76,.04);}
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:5px;}
.notif-dot.read{background:transparent;border:1px solid #444;}
.notif-title{font-size:.75rem;font-weight:600;color:var(--white);}
.notif-desc{font-size:.65rem;color:var(--grey);margin-top:2px;line-height:1.4;}
.notif-time{font-size:.58rem;color:#555;margin-top:3px;}

/* PLAN CARD */
.planc{border-radius:var(--r);padding:14px;margin-bottom:9px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;}
.planc.free{background:var(--dk3);border-color:#2a2a2a;}
.planc.vit{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.03));border-color:rgba(201,168,76,.35);}
.planc.pro{background:linear-gradient(135deg,rgba(139,105,20,.18),rgba(201,168,76,.07));border-color:rgba(201,168,76,.6);}
.pname{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500;color:var(--white);}
.ppr{font-size:1.1rem;font-weight:700;color:var(--gold);}
.pfeat{font-size:.64rem;color:var(--grey);padding:2px 0;}
.pfeat::before{content:"✓ ";color:var(--gold);}

/* DOC CARD */
.docc{display:flex;gap:11px;align-items:flex-start;padding:12px;background:var(--dk3);border:1px solid #252525;border-radius:var(--r);margin-bottom:9px;cursor:pointer;transition:all .2s;}
.docc:hover{border-color:rgba(201,168,76,.3);}
.docav{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2a2a2a,var(--gold-d));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}

/* AVATAR SELECT */
.avopt{background:var(--dk3);border:1.5px solid #2a2a2a;border-radius:18px;padding:14px;width:44%;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .2s;}
.avopt.sel{border-color:var(--gold);background:rgba(201,168,76,.08);}

/* CHAT */
.cinw{display:flex;gap:7px;align-items:center;padding:9px 14px;background:var(--dk2);border-top:1px solid #222;flex-shrink:0;}
.cinp{flex:1;background:var(--dk3);border:1px solid #2a2a2a;border-radius:20px;padding:9px 13px;font-size:.73rem;color:var(--white);outline:none;font-family:'Inter',sans-serif;}
.csend{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--gold-d),var(--gold));border:none;color:var(--blk);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.cmic{width:30px;height:30px;border-radius:50%;background:var(--dk3);border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;flex-shrink:0;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--dk3);border:1px solid var(--gold);border-radius:50px;padding:9px 18px;font-size:.72rem;color:var(--white);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;}
.toast.show{opacity:1;}

/* GATE */
.gate-card{background:linear-gradient(135deg,rgba(229,57,53,.14),rgba(229,57,53,.04));border:1px solid rgba(229,57,53,.3);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:14px;}

/* CREDIT CARD */
.cred{background:linear-gradient(135deg,rgba(156,39,176,.12),rgba(156,39,176,.04));border:1px solid rgba(156,39,176,.25);border-radius:var(--r);padding:14px;margin-bottom:9px;cursor:pointer;transition:all .2s;}
.cred:hover,.cred.sel{border-color:var(--pur);}

/* SUPP CARD */
.suppc{background:var(--dk3);border:1px solid #252525;border-radius:var(--r);padding:13px;margin-bottom:9px;}
.suppn{font-size:.85rem;font-weight:600;color:var(--white);}
.suppdose{font-size:.65rem;color:var(--grey);margin-top:2px;}
.suppwhy{font-size:.62rem;color:var(--gold);margin-top:4px;cursor:pointer;text-decoration:underline;}

/* SESSION ROW */
.sessrow{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e;cursor:pointer;gap:10px;}
.sessrow:hover{opacity:.8;}

/* MINI PROGRESS CHART */
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:50px;}
.cbar{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--gold),var(--gold-d));min-height:3px;cursor:pointer;}

/* PARTNER LAB CARD */
.labcard{background:var(--dk3);border:1px solid #252525;border-radius:var(--r);padding:13px;margin-bottom:9px;cursor:pointer;transition:all .2s;}
.labcard:hover{border-color:rgba(201,168,76,.3);}

/* LOGO HEADER */
.logoh{text-align:center;padding:28px 16px 16px;flex-shrink:0;}
.logotxt{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--gold);letter-spacing:.25em;text-transform:uppercase;}
.logosub{font-size:.5rem;color:var(--grey);letter-spacing:.3em;text-transform:uppercase;margin-top:3px;}

/* RING HELPER */


html,body{height:100%;overflow:hidden;}
body{flex-direction:row!important;align-items:stretch!important;padding:0!important;min-height:0!important;height:100vh!important;overflow:hidden!important;}
.page-title,.page-sub,.flow-wrap,.flow-group,.flow-label,.arrow-right{display:none!important;}
.phone{width:320px!important;height:660px!important;flex-shrink:0!important;position:relative!important;overflow:hidden!important;}
.screen{display:none!important;position:absolute!important;inset:0!important;flex-direction:column!important;overflow:hidden!important;}
.screen.active{display:flex!important;}
.cnt{flex:1!important;overflow-y:auto!important;min-height:0!important;display:flex!important;flex-direction:column!important;scrollbar-width:none;}
.cnt::-webkit-scrollbar{display:none;}
.bnav,.cinw{flex-shrink:0!important;}
#sidebar{width:220px;flex-shrink:0;height:100vh;overflow-y:auto;background:#0c0c0c;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:#2a2a2a #0c0c0c;}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid #1e1e1e;flex-shrink:0;}
.sb-logo{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:#C9A84C;letter-spacing:.22em;}
.sb-sub{font-size:.46rem;color:#444;letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}
.sb-count{font-size:.5rem;color:rgba(201,168,76,.45);margin-top:4px;}
.sb-group-title{font-size:.46rem;color:#555;letter-spacing:.14em;text-transform:uppercase;padding:9px 14px 3px;font-weight:600;border-top:1px solid #181818;}
.sb-item{display:block!important;width:100%;text-align:left;background:none;border:none;padding:5px 14px 5px 18px;font-size:.62rem;color:#666;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;border-left:2px solid transparent;line-height:1.35;}
.sb-item:hover{color:#aaa;background:rgba(255,255,255,.025);}
.sb-item.on{color:#C9A84C!important;border-left-color:#C9A84C!important;background:rgba(201,168,76,.05);}
#main{flex:1;display:flex!important;align-items:center;justify-content:center;flex-direction:column;gap:8px;overflow:hidden;}
#scinfo{font-size:.5rem;color:#333;letter-spacing:.07em;text-align:center;}
#toast,div.toast{position:fixed!important;bottom:22px!important;left:calc(220px + (100vw - 220px)/2)!important;transform:translateX(-50%)!important;background:#1c1c1c!important;border:1px solid #C9A84C!important;border-radius:50px!important;padding:7px 16px!important;font-size:.68rem!important;color:#F8F4EC!important;z-index:9999!important;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:280px;}
#toast.show,div.toast.show{opacity:1!important;}

</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">&#x2B21; OLMA</div>
    <div class="sb-sub">Patient App Prototype</div>
    <div class="sb-count" id="sc-label">loading&hellip;</div>
  </div>
  <div id="nav-list"></div>
</div>

<div id="main">
  <div class="phone" id="phone"></div>
  <div id="scinfo"></div>
</div>

<div class="toast" id="toast"></div>

<script>

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
let toastTimer;
function toast(msg){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

function go(a,b){var sid=(b!==undefined)?b:a;if(!sid)return;document.querySelectorAll("#phone .screen").forEach(function(s){s.classList.remove("active");});var sc=document.getElementById("sc-"+sid);if(sc){sc.classList.add("active");sc.querySelectorAll(".cnt").forEach(function(c){c.scrollTop=0;});}document.querySelectorAll(".sb-item").forEach(function(n){n.classList.remove("on");});var btn=document.querySelector(".sb-item[data-sid=\""+sid+"\"]");if(btn){btn.classList.add("on");btn.scrollIntoView({block:"nearest",behavior:"smooth"});}if(window.FLAT_SCREENS){var all=Object.keys(FLAT_SCREENS),ix=all.indexOf(sid)+1,lb=FLAT_SCREENS[sid]||sid;var inf=document.getElementById("scinfo");if(inf)inf.textContent=ix+" of "+all.length+"  ·  "+lb;}}

function ring(score,color,size=110){
  const r=size/2-9,cx=size/2,cy=size/2,circ=2*Math.PI*r,off=circ-(score/100)*circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e1e1e" stroke-width="7"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"
      style="transform:rotate(-90deg);transform-origin:${cx}px ${cy}px"/>
  </svg>`;
}

function scoreRing(score,label,color='#C9A84C',size=110){
  return `<div class="sring" style="width:${size}px;height:${size}px">
    ${ring(score,color,size)}
    <div class="sctr">
      <div class="snum" style="font-size:${size>90?'1.8rem':'1.2rem'}">${score}</div>
      <div class="slbl">${label}</div>
    </div>
  </div>`;
}

function sb(){return `<div class="sb"><span>9:41</span><span style="color:#888">●●● ▲ ⬛</span></div>`;}

function bnav(p,active){var it=[["⌂","Home","home-s7"],["📊","Progress","progress"],["👩","Vita","vita-home"],["🛒","Store","store"],["⚙","Profile","profile"]];var h="<div class=\"bnav\">";it.forEach(function(x){h+='<div class="ni'+(active===x[1]?' on':'')+'" onclick="go(\'"+x[2]+"\')"><div class="nic">'+x[0]+'</div><div class="nil">'+x[1]+'</div></div>';});h+="</div>";return h;}

function hdr(p,back,title,act){act=act||'';return '<div class="hdr"><div class="hback" onclick="go(\''+back+'\')">←</div><div class="htitle">'+title+'</div><div class="hact">'+act+'</div></div>';}

    if(destPhone){

      go(destPhone, target);
      return;
    }
  }

}
